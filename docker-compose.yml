version: '3.9'

services:
  # ── MongoDB Database ────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0-alpine
    container_name: smartattend-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: smartattend
      MONGO_INITDB_ROOT_PASSWORD: smartattend_secret
      MONGO_INITDB_DATABASE: smartattend
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API (Node.js + Express) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartattend-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://smartattend:smartattend_secret@mongodb:27017/smartattend?authSource=admin
      JWT_SECRET: change_this_in_production_use_random_64_chars
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
        NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:8000
    container_name: smartattend-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:8000

  # ── AI Face Recognition Service (Python + FastAPI) ──────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smartattend-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - face_encodings:/app/data/face_encodings
    environment:
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5000
      ENCODINGS_DIR: /app/data/face_encodings
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
  uploads_data:
  face_encodings:
